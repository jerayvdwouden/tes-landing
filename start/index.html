:root{

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--white);font-family:'DM Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-weight:300;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 22px;overflow-x:hidden;position:relative}
.glow{position:fixed;width:640px;height:360px;border-radius:50%;background:radial-gradient(circle,rgba(201,168,76,0.07) 0%,transparent 65%);top:-150px;left:50%;transform:translateX(-50%);pointer-events:none;z-index:0}

.logo{font-family:'Abolition',sans-serif;font-size:1.5rem;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);line-height:1}

.intro{font-size:.92rem;color:var(--muted);line-height:1.65;margin:1.9rem 0 1.7rem;max-width:360px}

.btn:hover{transform:translateY(-2px);border-color:var(--gold);box-shadow:0 8px 24px rgba(0,0,0,.45)}
.btn-primary{background:linear-gradient(135deg,#E8C97A 0%,#C9A84C 50%,#E8C97A 100%);color:#0D0D0D;border:none;font-weight:700;box-shadow:0 0 18px rgba(201,168,76,.35)}
.btn-primary:hover{box-shadow:0 0 26px rgba(201,168,76,.6)}
.btn .ic{width:19px;height:19px;flex:0 0 19px}

.btn-soc{flex:1}
